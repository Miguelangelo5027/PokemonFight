<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Random</title>
</head>
<body>
    <h1>5 Random Pokemon</h1>
    <button onclick="getRandomPokemon()">Get Pokemon!</button>
    <div id="pokemon-container"></div>
    <div>
        <p id="contador-pokemon">Total Pokémon mostrados: 0</p>
    </div>

    <div id="pelea-pokemon-container">
        <h2>Simulador de Pelea</h2>
        <input type="number" placeholder="ID Pokémon 1" id="primer-pokemon">
        <input type="number" placeholder="ID Pokémon 2" id="segundo-pokemon">
        <br><br>
        <button onclick="pelea()">¡PELEAR!</button>
        <div id="pelea-resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
